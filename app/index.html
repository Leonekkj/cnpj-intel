<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNPJ Intel — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/styles.css">
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 8L12 4L20 8V16L12 20L4 16V8Z" stroke="currentColor" stroke-width="1.5"/><path d="M12 12L20 8M12 12V20M12 12L4 8" stroke="currentColor" stroke-width="1.5"/></svg>
      </div>
      <div class="brand-text">
        <div class="brand-name">CNPJ Intel</div>
        <div class="brand-sub">Prospecção B2B</div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-label">Workspace</div>
      <a class="nav-item active" data-tab="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        <span>Visão geral</span>
      </a>
      <a class="nav-item" data-tab="empresas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 10h6M9 14h6M9 18h6"/></svg>
        <span>Empresas</span>
        <span class="nav-tag" id="nav-total">—</span>
      </a>
      <a class="nav-item" data-tab="busca">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <span>Busca avançada</span>
      </a>
      <a class="nav-item" data-tab="listas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        <span>Minhas listas</span>
      </a>

      <div class="nav-label">Dados</div>
      <a class="nav-item" data-tab="exportar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>
        <span>Exportar CSV</span>
      </a>
      <a class="nav-item" data-tab="api">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg>
        <span>API & Webhooks</span>
      </a>

      <div class="nav-label" id="admin-section" style="display:none">Admin</div>
      <a class="nav-item" data-tab="clientes" id="nav-clientes" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M16 20v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 20v-2a4 4 0 0 0-3-3.9M16 3.1a4 4 0 0 1 0 7.8"/></svg>
        <span>Clientes</span>
      </a>
    </nav>

    <div class="sidebar-foot">
      <div class="plan-card">
        <div class="plan-row">
          <div class="plan-name" id="plan-name">Carregando…</div>
          <span class="plan-badge" id="plan-badge">—</span>
        </div>
        <div class="plan-meter">
          <div class="plan-meter-bar" id="plan-meter-bar" style="width:0%"></div>
        </div>
        <div class="plan-stats" id="plan-stats">
          <span>—</span>
        </div>
      </div>
      <div class="agent-row">
        <span class="agent-pulse"></span>
        <div class="agent-text">
          <div class="agent-label">Agente coletor</div>
          <div class="agent-sub" id="agent-sub">Processando…</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="crumbs">
        <span class="crumb-muted">Workspace</span>
        <span class="crumb-sep">/</span>
        <span class="crumb-current" id="crumb-current">Visão geral</span>
      </div>
      <div class="topbar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" width="14" height="14"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" placeholder="Pesquisar empresa, CNPJ, sócio…" id="global-search">
        <kbd>⌘K</kbd>
      </div>
      <div class="topbar-actions">
        <button class="hamburger" id="hamburger-btn">☰</button>
        <button class="icon-btn" id="help-btn" title="Ajuda">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 1 1 5.8 1c0 2-3 3-3 3M12 17h.01"/></svg>
        </button>
        <div class="user-chip" onclick="openTweaks()" title="Preferências">
          <div class="avatar" id="user-avatar">?</div>
          <div class="user-txt">
            <div class="user-name" id="user-name">—</div>
            <div class="user-sub" id="user-sub">—</div>
          </div>
        </div>
      </div>
    </header>

    <!-- CONTENT -->
    <div class="content" id="content">
      <div class="empty-state" style="padding:80px 20px">
        <div class="big">Carregando…</div>
      </div>
    </div>
  </main>
</div>

<!-- Tweaks panel (densidade da tabela e preferências) -->
<div class="tweaks-panel" id="tweaks-panel">
  <div class="tweaks-header">
    <span>Preferências</span>
    <button class="tweaks-close" onclick="closeTweaks()">×</button>
  </div>
  <div class="tweaks-body">
    <div class="tweak-group">
      <label>Densidade da tabela</label>
      <div class="tweak-segments" id="tw-density">
        <button data-val="comfort">Confortável</button>
        <button data-val="normal" class="on">Normal</button>
        <button data-val="compact">Compacta</button>
      </div>
    </div>
    <div class="tweak-group">
      <label>Raio das bordas</label>
      <div class="tweak-segments" id="tw-radius">
        <button data-val="sharp">Reto</button>
        <button data-val="soft" class="on">Suave</button>
        <button data-val="round">Arredondado</button>
      </div>
    </div>
    <div class="tweak-group" style="margin-top:8px;border-top:1px solid var(--border-soft);padding-top:16px">
      <button class="btn btn-danger" onclick="logout()" style="width:100%">Sair da conta</button>
    </div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<script src="/app/app.js" defer></script>
</body>
</html>
