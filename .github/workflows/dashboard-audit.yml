name: Dashboard Audit

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC diário
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Atualizar baselines (true/false)'
        default: 'false'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Update baselines
        if: github.event.inputs.update_baselines == 'true'
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: python scripts/dashboard_audit.py --update-baselines

      - name: Commit updated baselines
        if: github.event.inputs.update_baselines == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/visual/baselines/
          git diff --cached --quiet || git commit -m "chore(audit): atualiza baselines [skip ci]"
          git push

      - name: Run dashboard audit
        if: github.event.inputs.update_baselines != 'true'
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/dashboard_audit.py

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-screenshots-${{ github.run_id }}
          path: tests/visual/latest/*.png
          retention-days: 7
